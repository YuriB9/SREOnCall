services:
  postgres:
    image: postgres:17.10-alpine3.23
    environment:
      POSTGRES_USER: oncall
      POSTGRES_PASSWORD: oncall
      POSTGRES_DB: oncall
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oncall"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.4-alpine3.23
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.3.1-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: oncall
      RABBITMQ_DEFAULT_PASS: oncall
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  keycloak:
    image: keycloak/keycloak:26.6.3
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    command: start-dev --import-realm
    volumes:
      - ./keycloak/oncall-realm.json:/opt/keycloak/data/import/oncall-realm.json:ro
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '\"status\": \"UP\"' <&3"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  postgres_data:
  rabbitmq_data:
