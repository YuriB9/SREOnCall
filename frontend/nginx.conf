server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — все маршруты отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Агрессивное кэширование для hashed-ресурсов Vite
    location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html не кэшируется — браузер всегда проверяет актуальность
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
