# Shared service-to-service auth key.
# scheduling validates it (ADMIN_API_KEY); escalation and notification send it
# as X-Admin-Key (SCHEDULING_ADMIN_KEY). One key, one place — keep it only in
# this Secret, never in configmaps.
apiVersion: v1
kind: Secret
metadata:
  name: service-auth
type: Opaque
stringData:
  ADMIN_KEY: "change-me"
