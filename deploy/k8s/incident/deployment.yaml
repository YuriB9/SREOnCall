apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident
  labels:
    app: incident
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident
  template:
    metadata:
      labels:
        app: incident
    spec:
      containers:
        - name: incident
          image: sre-oncall/incident:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: incident-config
            - secretRef:
                name: incident-secret
          env:
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: service-auth
                  key: ADMIN_KEY
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
